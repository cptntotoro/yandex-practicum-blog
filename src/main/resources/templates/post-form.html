<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title th:text="${post != null} ? 'Редактировать пост' : 'Добавить пост'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  </head>
  <body>
    <div class="container mt-4">
      <h1 th:text="${post != null} ? 'Редактировать пост' : 'Добавить пост'"></h1>

      <form th:action="${post != null} ? '/posts/' + ${post.id} : '/posts'" th:object="${post}" method="post">
        <div class="mb-3">
          <label for="title" class="form-label">Название</label>
          <input type="text" class="form-control" id="title" th:field="*{title}" required>
        </div>
        <div class="mb-3">
          <label for="imageUrl" class="form-label">Ссылка на картинку</label>
          <input type="url" class="form-control" id="imageUrl" th:field="*{imageUrl}">
        </div>
        <div class="mb-3">
          <label for="content" class="form-label">Текст поста</label>
          <textarea class="form-control" id="content" th:field="*{content}" rows="5" required></textarea>
        </div>
        <div class="mb-3">
          <label for="tags" class="form-label">Теги (через запятую)</label>
          <input type="text" class="form-control" id="tags" th:field="*{tags}">
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </form>
    </div>
  </body>
</html>
