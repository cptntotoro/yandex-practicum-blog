<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title th:text="${post.title}"></title>
    <link rel="stylesheet" href="/static/css/post-styles.css">
  </head>
  <body>
    <div class="container mt-4">
      <h1 th:text="${post.title}"></h1>

      <!-- Картинка поста -->
      <img th:src="${post.imageUrl}" class="img-fluid mb-3" alt="Изображение поста">

      <!-- Текст поста -->
      <div th:utext="${#strings.replace(post.content, T(java.lang.System).getProperty('line.separator'), '<br>')}"></div>

      <!-- Теги -->
      <p class="mt-3">
        <strong>Теги:</strong> <span th:text="${post.tags}"></span>
      </p>

      <!-- Лайки -->
      <div class="mb-3">
        <button class="btn btn-outline-primary" onclick="likePost()">
          Лайк (<span th:text="${post.likes}"></span>)
        </button>
      </div>

      <!-- Кнопки редактирования и удаления -->
      <div class="mb-3">
        <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-warning">Редактировать</a>
        <button class="btn btn-danger" onclick="deletePost()">Удалить</button>
      </div>

      <!-- Форма добавления комментария -->
      <div class="mb-3">
        <textarea id="commentText" class="form-control" placeholder="Введите комментарий"></textarea>
        <button class="btn btn-success mt-2" onclick="addComment()">Добавить комментарий</button>
      </div>

      <!-- Список комментариев -->
      <h3>Комментарии</h3>
      <div th:each="comment : ${post.comments}" class="card mb-2">
        <div class="card-body">
          <p class="card-text" th:text="${comment.text}"></p>
          <button class="btn btn-sm btn-outline-secondary" onclick="editComment(this)">Редактировать</button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteComment(this)">Удалить</button>
        </div>
      </div>
    </div>

    <script type="text/javascript" th:src="@{static/js/post-script.js}"></script>
  </body>
</html>
